name: build

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  docker-tests:
    name: Docker unit and integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare log directory
        run: mkdir -p var/ci-logs

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Build Docker images
        run: |
          set -o pipefail
          docker compose -f docker-compose.yml -f docker-compose.test.yml build frontend backend worker \
            2>&1 | tee var/ci-logs/docker-build.log

      - name: Check production Docker config
        run: |
          set -o pipefail
          bash bin/docker-prod-smoke.sh 2>&1 | tee var/ci-logs/docker-prod-smoke.log

      - name: Run Docker tests
        run: |
          set -o pipefail
          make test-docker 2>&1 | tee var/ci-logs/make-test-docker.log

      - name: Collect Docker logs
        if: failure()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml ps \
            > var/ci-logs/docker-compose-ps.log || true
          docker compose -f docker-compose.yml -f docker-compose.test.yml logs --no-color \
            > var/ci-logs/docker-compose.log || true

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-test-logs
          path: var/ci-logs
          if-no-files-found: ignore
          retention-days: 14

      - name: Cleanup Docker services
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml down --remove-orphans
