name: build

on:
  pull_request:
  push:

jobs:
  tests:
    name: PHP 8.4 / PostgreSQL 16
    runs-on: ubuntu-latest

    services:
      postgresql:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: yii2advanced_test
          POSTGRES_USER: yii2advanced
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U yii2advanced -d yii2advanced_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

      rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
          - 5672:5672
          - 15672:15672

    env:
      COMPOSER_ALLOW_SUPERUSER: 1
      extensions: dom, json, gd, intl, pdo, pdo_pgsql, zip
      key: cache-v1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup cache environment
        id: cache-env
        uses: shivammathur/cache-extensions@v1
        with:
          php-version: "8.4"
          extensions: ${{ env.extensions }}
          key: ${{ env.key }}

      - name: Cache extensions
        uses: actions/cache@v4
        with:
          path: ${{ steps.cache-env.outputs.dir }}
          key: ${{ steps.cache-env.outputs.key }}
          restore-keys: ${{ steps.cache-env.outputs.key }}

      - name: Install PHP with extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: ${{ env.extensions }}
          ini-values: date.timezone='UTC'
          coverage: pcov

      - name: Determine Composer cache directory
        run: echo "COMPOSER_CACHE_DIR=$(composer config cache-dir)" >> "$GITHUB_ENV"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.COMPOSER_CACHE_DIR }}
          key: php-8.4-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: php-8.4-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader --ansi

      - name: Initialize application
        run: |
          chmod +x ./yii2/init
          ./yii2/init --env=Development --interactive=0 --overwrite=All
          sed -i "s/DB_HOST=postgresql/DB_HOST=127.0.0.1/" ./yii2/.env
          sed -i "s/DB_HOST_TEST=\${DB_HOST}/DB_HOST_TEST=127.0.0.1/" ./yii2/.env
          sed -i "s/REDIS_CONTAINER_NAME=redis/REDIS_CONTAINER_NAME=127.0.0.1/" ./yii2/.env
          sed -i "s/RABBITMQ_HOST=rabbitmq/RABBITMQ_HOST=127.0.0.1/" ./yii2/.env
          chmod +x ./yii2/yii ./yii2/yii_test

      - name: Validate configuration
        run: |
          composer validate --strict
          ./vendor/bin/codecept config:validate

      - name: Apply test migrations
        run: php ./yii2/yii_test migrate --interactive=0

      - name: Run tests
        run: |
          ./vendor/bin/codecept build
          ./vendor/bin/codecept run
